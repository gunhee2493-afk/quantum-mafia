<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>레이저 순찰대: 거수자몬스터를 잡아라</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;background:#070b16;overflow:hidden;font-family:'Jua','Malgun Gothic',sans-serif;color:#eaf6ff}
#wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
canvas{display:block;touch-action:none;border-radius:14px;background:#0a0f1f}
.ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(4,8,18,.82);backdrop-filter:blur(3px);z-index:10;border-radius:14px}
.hidden{display:none !important}
.card{text-align:center;background:linear-gradient(160deg,#101a33,#0a1124);border:2px solid #2b4a8f;border-radius:22px;padding:30px 44px;box-shadow:0 0 46px rgba(60,140,255,.28);max-width:86%}
h1{font-size:42px;color:#ffd257;text-shadow:0 0 18px rgba(255,180,40,.55);margin-bottom:6px}
.sub{font-size:19px;color:#bfe3ff;margin-bottom:14px}
.how{list-style:none;font-size:16px;color:#9fc0e8;line-height:1.95;margin-bottom:18px;text-align:left;display:inline-block}
button{font-family:inherit;border:0;cursor:pointer;border-radius:14px;color:#fff}
.big{font-size:25px;padding:13px 46px;background:linear-gradient(180deg,#ff5f4d,#d92f2f);box-shadow:0 6px 0 #8f1d1d}
.big:active{transform:translateY(4px);box-shadow:0 2px 0 #8f1d1d}
.green{background:linear-gradient(180deg,#4ddb7c,#1fa04d);box-shadow:0 6px 0 #126830}
.green:active{transform:translateY(4px);box-shadow:0 2px 0 #126830}
.stageSel{margin-top:18px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.stageSel button{width:44px;height:44px;font-size:18px;background:#1b2b52;color:#9fc0e8;border:1px solid #33549b;border-radius:10px}
.stageSel button.sel{background:#33549b;color:#fff;border-color:#6ea0ff}
.selLabel{margin-top:16px;font-size:14px;color:#5f7aa8}
.clearTitle{font-size:38px;color:#5dff9a;text-shadow:0 0 16px rgba(80,255,150,.5);margin-bottom:6px}
.failTitle{font-size:36px;color:#ff7b6b;margin-bottom:10px}
.disc{background:#132242;border:2px dashed #ffd257;color:#ffe9ab;font-size:20px;padding:14px 22px;border-radius:14px;margin:16px 0 20px;line-height:1.5}
.discTag{font-size:14px;color:#ffb347;letter-spacing:2px;margin-bottom:12px}
.stat{font-size:19px;color:#bfe3ff;margin:6px 0}
.rank{font-size:30px;color:#ffd257;margin:14px 0 20px}
.credit{margin-top:18px;font-size:12px;color:#3d5378}
</style>
</head>
<body>
<div id="wrap">
<canvas id="cv" width="1100" height="700"></canvas>

<div id="ovTitle" class="ov">
  <div class="card">
    <h1>⚡ 레이저 순찰대</h1>
    <p class="sub">학교에 숨어든 <b style="color:#c98bff">거수자몬스터</b>를 레이저로 잡아라!</p>
    <ul class="how">
      <li>👆 빈 곳을 터치하면 그쪽으로 <b>조준</b></li>
      <li>🪞 아래 트레이에서 거울·렌즈를 <b>끌어다 배치</b>, 노란 손잡이로 <b>회전</b></li>
      <li>🔫 기회는 스테이지마다 딱 몇 발! <b>감으로</b> 맞혀라</li>
      <li>🛡️ 방어막 몬스터는 <b>파워빔</b>(빛을 모은 빔)만 통한다</li>
    </ul>
    <br>
    <button id="btnStart" class="big">🚨 출동!</button>
    <div class="stageSel" id="stageSel"></div>
    <div class="selLabel">스테이지 선택 (수업용)</div>
    <div class="credit">빛의 직진 · 반사 · 굴절 학습 게임 · v1.0</div>
  </div>
</div>

<div id="ovClear" class="ov hidden">
  <div class="card">
    <div class="clearTitle" id="clearTitle">STAGE CLEAR!</div>
    <div class="discTag">✦ 발견 카드 ✦</div>
    <div class="disc" id="discText"></div>
    <button id="btnNext" class="big green">다음 스테이지 ▶</button>
  </div>
</div>

<div id="ovFail" class="ov hidden">
  <div class="card">
    <div class="failTitle">으악, 기회 끝!</div>
    <p class="sub" id="failText">거수자몬스터가 약올리며 도망쳤다…</p>
    <button id="btnRetry" class="big">🔥 다시 도전</button>
  </div>
</div>

<div id="ovEnd" class="ov hidden">
  <div class="card">
    <div class="clearTitle">🎉 소탕 완료!</div>
    <p class="sub">학교의 거수자몬스터를 모두 잡았다!</p>
    <div class="stat" id="endShots"></div>
    <div class="rank" id="endRank"></div>
    <button id="btnReplay" class="big">처음으로</button>
  </div>
</div>
</div>

<script>
'use strict';
// ================= 상수 =================
const W=1100,H=700,FH=580,EPS=0.05;
const F_LEN=170, ARC_R=150, ARC_SPAN=0.55, SPREAD=0.31;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

// ================= 벡터 =================
const vec=(x,y)=>({x,y});
const add=(a,b)=>vec(a.x+b.x,a.y+b.y);
const sub=(a,b)=>vec(a.x-b.x,a.y-b.y);
const mul=(a,k)=>vec(a.x*k,a.y*k);
const dot=(a,b)=>a.x*b.x+a.y*b.y;
const crs=(a,b)=>a.x*b.y-a.y*b.x;
const len=a=>Math.hypot(a.x,a.y);
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const norm=a=>{const l=len(a)||1;return vec(a.x/l,a.y/l)};
const perp=a=>vec(-a.y,a.x);
const ang=a=>Math.atan2(a.y,a.x);
const fromAng=t=>vec(Math.cos(t),Math.sin(t));
const rotv=(a,t)=>vec(a.x*Math.cos(t)-a.y*Math.sin(t),a.x*Math.sin(t)+a.y*Math.cos(t));
const reflect=(d,n)=>sub(d,mul(n,2*dot(d,n)));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const inRect=(p,r)=>r&&p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h;
const pointInRect=(p,r)=>p.x>r.x&&p.x<r.x+r.w&&p.y>r.y&&p.y<r.y+r.h;

// ================= 사운드 =================
let AC=null,soundOn=true;
function ensureAudio(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); }
function tone(f0,f1,dur,type,vol){ if(!soundOn||!AC)return; try{ const o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime; o.type=type; o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur); o.connect(g).connect(AC.destination); o.start(t); o.stop(t+dur);}catch(e){} }
function noiseS(dur,vol,fc){ if(!soundOn||!AC)return; try{ const n=AC.sampleRate*dur|0,b=AC.createBuffer(1,n,AC.sampleRate),d=b.getChannelData(0); for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n); const s=AC.createBufferSource(); s.buffer=b; const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=fc; const g=AC.createGain(); g.gain.value=vol; s.connect(f); f.connect(g); g.connect(AC.destination); s.start();}catch(e){} }
const SFX={
 fire:()=>tone(950,180,0.18,'sawtooth',0.25),
 ping:()=>tone(1500,900,0.08,'square',0.1),
 focus:()=>tone(500,1500,0.16,'sine',0.2),
 split:()=>tone(800,300,0.16,'triangle',0.18),
 boom:()=>{noiseS(0.5,0.5,900);tone(220,40,0.4,'sawtooth',0.3);},
 shield:()=>{tone(340,300,0.22,'square',0.18);tone(520,480,0.22,'square',0.1);},
 fizzle:()=>tone(220,60,0.2,'sawtooth',0.09),
 clear:()=>{tone(523,523,0.12,'square',0.16);setTimeout(()=>tone(659,659,0.12,'square',0.16),130);setTimeout(()=>tone(784,1046,0.3,'square',0.16),260);},
 fail:()=>{tone(300,120,0.5,'sawtooth',0.2);}
};

// ================= 스테이지 =================
const ITEM_INFO={
 mirror:{name:'평면거울',len:96,defAngle:-Math.PI/4},
 clens:{name:'볼록렌즈',len:92,defAngle:-Math.PI/2},
 dlens:{name:'오목렌즈',len:92,defAngle:-Math.PI/2},
 cmir:{name:'오목거울',len:0,defAngle:Math.PI}
};
const TAUNTS=['푸하하! 그것밖에 못 쏴?','여기다 여기~ ㅋㅋ','눈 감고 쏘는 거야?','아깝다~ 아까워~','레이저 낭비 오지네ㅋㅋ','살살 좀 쏴라, 무섭게~'];
const FAILTXT=['거수자몬스터: "낼 다시 와라 인간~ ㅋㅋ"','거수자몬스터가 혀를 낼름거리며 사라졌다…','거수자몬스터: "레이저 다 썼지롱~"'];
const STAGES=[
 {name:'첫 출동', hint:'빈 곳을 터치해 조준하고, 발사 버튼을 눌러라!', discovery:'빛은 곧게 나아간다! (빛의 직진)',
  launcher:{x:90,y:290,angle:0}, shots:3, walls:[], glass:[], tray:[],
  monsters:[{x:950,y:170,r:26}]},
 {name:'코너 뒤의 녀석', hint:'거울을 끌어다 놓고, 노란 손잡이를 돌려 각도를 맞춰라!', discovery:'빛은 거울에서 들어온 만큼 튕겨 나간다! (반사)',
  launcher:{x:90,y:290,angle:0}, shots:3, walls:[{x:680,y:0,w:40,h:330}], glass:[],
  tray:[{type:'mirror',count:1}],
  monsters:[{x:950,y:120,r:26}]},
 {name:'이중 반사', hint:'거울 2개로 코너를 돌아라!', discovery:'거울을 이으면 빛이 지그재그로 어디든 간다!',
  launcher:{x:90,y:470,angle:0}, shots:3,
  walls:[{x:400,y:0,w:40,h:380},{x:700,y:200,w:40,h:380}], glass:[],
  tray:[{type:'mirror',count:2}],
  monsters:[{x:980,y:110,r:26}]},
 {name:'유리벽 너머', hint:'유리를 지나면 빛이 살짝 꺾인다… 감으로 보정하라!', discovery:'빛은 유리나 물을 지날 때 꺾인다! (굴절)',
  launcher:{x:90,y:470,angle:0}, shots:3,
  walls:[{x:430,y:0,w:200,h:150},{x:430,y:450,w:200,h:130}],
  glass:[{x:430,y:150,w:200,h:300}],
  tray:[{type:'mirror',count:1}],
  monsters:[{x:950,y:140,r:19}]},
 {name:'방어막 등장', hint:'방어막은 파워빔만 뚫는다! 볼록렌즈에 빔을 통과시켜라', discovery:'볼록렌즈는 빛을 한 점에 모은다 → 파워빔! 🔥',
  launcher:{x:90,y:290,angle:0}, shots:3, walls:[], glass:[],
  tray:[{type:'clens',count:1},{type:'mirror',count:1}],
  monsters:[{x:950,y:290,r:30,shield:true}]},
 {name:'무리 습격', hint:'오목렌즈는 빔을 3갈래로 퍼뜨린다! 놓는 위치가 중요', discovery:'오목렌즈는 빛을 넓게 퍼뜨린다!',
  launcher:{x:90,y:290,angle:0}, shots:2, walls:[], glass:[],
  tray:[{type:'dlens',count:1},{type:'mirror',count:1}],
  monsters:[{x:950,y:175,r:24},{x:1000,y:290,r:24},{x:950,y:405,r:24}]},
 {name:'오목거울의 힘', hint:'오목거울은 빛을 모아서 반사한다! 각도를 잘 돌려봐', discovery:'오목거울도 빛을 모은다 → 파워빔! 🔥',
  launcher:{x:90,y:290,angle:0}, shots:3, walls:[], glass:[],
  tray:[{type:'cmir',count:1},{type:'mirror',count:1}],
  monsters:[{x:260,y:110,r:28,shield:true}]},
 {name:'거수자 보스전', hint:'보스는 움직인다! 배운 걸 전부 써라!', discovery:'직진 · 반사 · 굴절 · 렌즈… 이제 빛은 네 무기다!',
  launcher:{x:90,y:290,angle:0}, shots:4,
  walls:[{x:520,y:230,w:60,h:120}], glass:[],
  tray:[{type:'mirror',count:2},{type:'clens',count:1}],
  monsters:[{x:700,y:110,r:24},{x:700,y:470,r:24},{x:960,y:290,r:42,shield:true,move:{range:130,speed:1.6}}]},
];
const FIELD_EDGES=[
 {a:vec(2,2),b:vec(W-2,2)},{a:vec(W-2,2),b:vec(W-2,FH-2)},
 {a:vec(W-2,FH-2),b:vec(2,FH-2)},{a:vec(2,FH-2),b:vec(2,2)}
];
function rectSegs(r){
 return [
  {a:vec(r.x,r.y),b:vec(r.x+r.w,r.y)},
  {a:vec(r.x+r.w,r.y),b:vec(r.x+r.w,r.y+r.h)},
  {a:vec(r.x+r.w,r.y+r.h),b:vec(r.x,r.y+r.h)},
  {a:vec(r.x,r.y+r.h),b:vec(r.x,r.y)}
 ];
}

// ================= 상태 =================
let state='title'; // title / play / clear / fail / end
let stageIdx=0, cur=STAGES[0], shots=3;
let monsters=[], items=[], tray=[];
let launcher=vec(90,290), aimAngle=0;
let selected=null, mode=null;
let beams=null, animActive=false, resolveT=0, killsThisShot=false;
let particles=[], taunts=[], shake=0, bannerT=0, time=0;
let totalShotsUsed=0, chosenStart=0;
let uiRects={fire:{x:930,y:602,w:150,h:82},reset:{x:864,y:612,w:54,h:62},sound:{x:W-56,y:10,w:46,h:38},chips:[]};

function loadStage(i){
 stageIdx=i; cur=STAGES[i];
 launcher=vec(cur.launcher.x,cur.launcher.y);
 aimAngle=cur.launcher.angle||0;
 shots=cur.shots||3;
 monsters=cur.monsters.map(m=>Object.assign({},m,{baseY:m.y,phase:Math.random()*6,dead:false,wob:Math.random()*6}));
 tray=(cur.tray||[]).map(t=>Object.assign({},t));
 uiRects.chips=tray.map((t,k)=>({tray:t,rect:{x:16+k*146,y:598,w:136,h:90}}));
 items=[]; selected=null; mode=null; beams=null; animActive=false; resolveT=0;
 particles=[]; taunts=[]; bannerT=3.4;
 state='play';
}

// ================= 광선 추적 =================
function raySeg(p,d,a,b){
 const s=sub(b,a), den=crs(d,s);
 if(Math.abs(den)<1e-9)return null;
 const ap=sub(a,p);
 const t=crs(ap,s)/den, u=crs(ap,d)/den;
 if(t>EPS&&u>=0&&u<=1)return {t,pt:add(p,mul(d,t))};
 return null;
}
function rayCirc(p,d,c,R){
 const oc=sub(p,c), b=dot(d,oc), c2=dot(oc,oc)-R*R, disc=b*b-c2;
 if(disc<0)return null; const s=Math.sqrt(disc);
 return [-b-s,-b+s];
}
function refract(d,n,eta){
 const cosi=-dot(d,n);
 const k=1-eta*eta*(1-cosi*cosi);
 if(k<0)return null;
 return add(mul(d,eta),mul(n,eta*cosi-Math.sqrt(k)));
}
function nearestHit(p,d){
 let best=null;
 const take=(t,pt,o)=>{ if(t>EPS&&(!best||t<best.t)) best=Object.assign({t,pt},o); };
 for(const s of FIELD_EDGES){const h=raySeg(p,d,s.a,s.b); if(h)take(h.t,h.pt,{type:'absorb'});}
 for(const w of cur.walls) for(const s of rectSegs(w)){const h=raySeg(p,d,s.a,s.b); if(h)take(h.t,h.pt,{type:'absorb'});}
 for(const g of cur.glass) for(const s of rectSegs(g)){const h=raySeg(p,d,s.a,s.b); if(h)take(h.t,h.pt,{type:'glass',n:perp(norm(sub(s.b,s.a))),g});}
 for(const it of items){
  if(it.type==='cmir'){
   const u=fromAng(it.angle), C=add(it.pos,mul(u,ARC_R));
   const ts=rayCirc(p,d,C,ARC_R);
   if(ts)for(const t of ts){ if(t>EPS){ const pt=add(p,mul(d,t)); const v=norm(sub(pt,C)); if(dot(v,mul(u,-1))>Math.cos(ARC_SPAN)) take(t,pt,{type:'cmir',C}); } }
  } else {
   const hl=ITEM_INFO[it.type].len/2, dir=fromAng(it.angle);
   const a=add(it.pos,mul(dir,-hl)), b=add(it.pos,mul(dir,hl));
   const h=raySeg(p,d,a,b);
   if(h)take(h.t,h.pt,{type:it.type,it,ea:a,eb:b});
  }
 }
 for(const m of monsters){ if(m.dead)continue;
  const ts=rayCirc(p,d,vec(m.x,m.y),m.r);
  if(ts){ const t=ts[0]>EPS?ts[0]:(ts[1]>EPS?ts[1]:null); if(t)take(t,add(p,mul(d,t)),{type:'monster',m}); }
 }
 return best;
}
function traceRay(p,d,power,depth,startAt,segs,events){
 d=norm(d);
 let at=startAt;
 for(let i=0;i<60;i++){
  const h=nearestHit(p,d);
  if(!h){ segs.push({a:p,b:add(p,mul(d,2000)),power,start:at}); return; }
  segs.push({a:p,b:h.pt,power,start:at});
  at+=h.t;
  if(h.type==='absorb'){ events.push({at,kind:'fizzle',pt:h.pt}); return; }
  if(h.type==='monster'){
   if(h.m.shield&&!power) events.push({at,kind:'shield',pt:h.pt,m:h.m});
   else events.push({at,kind:'boom',pt:h.pt,m:h.m});
   return;
  }
  if(h.type==='mirror'){
   let n=perp(norm(sub(h.eb,h.ea))); if(dot(n,d)>0)n=mul(n,-1);
   d=reflect(d,n); events.push({at,kind:'ping',pt:h.pt});
  }
  else if(h.type==='glass'){
   let n=h.n; if(dot(n,d)>0)n=mul(n,-1);
   const entering=pointInRect(add(h.pt,mul(d,0.5)),h.g)&&!pointInRect(add(h.pt,mul(d,-0.5)),h.g);
   const eta=entering?1/1.5:1.5;
   const rd=refract(d,n,eta);
   if(rd){ d=norm(rd); events.push({at,kind:'bend',pt:h.pt}); }
   else { d=reflect(d,n); events.push({at,kind:'ping',pt:h.pt}); }
  }
  else if(h.type==='clens'||h.type==='dlens'){
   const it=h.it, sdir=fromAng(it.angle);
   let n=perp(sdir); if(dot(n,d)<0)n=mul(n,-1);
   const dn=dot(d,n);
   if(Math.abs(dn)>=0.18){
    const hvec=sub(h.pt,it.pos);
    if(h.type==='clens'){
     d=norm(add(mul(d,1/dn),mul(hvec,-1/F_LEN)));
     power=true; events.push({at,kind:'focus',pt:h.pt});
    } else {
     const base=norm(add(mul(d,1/dn),mul(hvec,1/F_LEN)));
     events.push({at,kind:'split',pt:h.pt});
     if(depth<2){
      traceRay(add(h.pt,mul(rotv(base,-SPREAD),0.6)),rotv(base,-SPREAD),power,depth+1,at,segs,events);
      traceRay(add(h.pt,mul(base,0.6)),base,power,depth+1,at,segs,events);
      traceRay(add(h.pt,mul(rotv(base,SPREAD),0.6)),rotv(base,SPREAD),power,depth+1,at,segs,events);
     }
     return;
    }
   }
  }
  else if(h.type==='cmir'){
   let v=norm(sub(h.pt,h.C)); if(dot(v,d)>0)v=mul(v,-1);
   d=reflect(d,v); power=true; events.push({at,kind:'focus',pt:h.pt});
  }
  p=add(h.pt,mul(d,0.2));
 }
}

// ================= 발사/해결 =================
function fire(){
 if(state!=='play'||animActive||shots<=0)return;
 ensureAudio(); SFX.fire();
 shots--; totalShotsUsed++; killsThisShot=false; selected=null; mode=null;
 const d=fromAng(aimAngle);
 const segs=[],events=[];
 traceRay(add(launcher,mul(d,44)),d,false,0,0,segs,events);
 events.sort((a,b)=>a.at-b.at);
 let total=0; for(const s of segs) total=Math.max(total,s.start+dist(s.a,s.b));
 beams={segs,events,total,L:0,ei:0,fadeAt:0};
 animActive=true;
}
function handleEvent(ev){
 switch(ev.kind){
  case 'ping': spark(ev.pt,'#bfe9ff',5); SFX.ping(); break;
  case 'bend': spark(ev.pt,'#8fd0ff',5); break;
  case 'focus': spark(ev.pt,'#ffd257',12); SFX.focus(); break;
  case 'split': spark(ev.pt,'#c9a7ff',12); SFX.split(); break;
  case 'fizzle': spark(ev.pt,'#66707f',6); SFX.fizzle(); break;
  case 'shield': spark(ev.pt,'#57e8ff',18); SFX.shield(); shake=6; addTaunt(ev.m,'방어막이지롱~ 그냥 빔은 안 통해!'); break;
  case 'boom': if(!ev.m.dead){ ev.m.dead=true; killsThisShot=true; explode(ev.m); SFX.boom(); shake=14; } break;
 }
}
function resolveShot(){
 if(state!=='play')return;
 if(monsters.every(m=>m.dead)){ state='clear'; SFX.clear(); showClear(); return; }
 if(shots<=0){ state='fail'; SFX.fail(); showFail(); return; }
 if(!killsThisShot){
  const alive=monsters.filter(m=>!m.dead);
  const m=alive[Math.floor(Math.random()*alive.length)];
  addTaunt(m,TAUNTS[Math.floor(Math.random()*TAUNTS.length)]);
 }
}
function spark(pt,col,n){
 for(let i=0;i<n;i++){
  const a=Math.random()*Math.PI*2, sp=60+Math.random()*160;
  particles.push({x:pt.x,y:pt.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,g:120,life:0.3+Math.random()*0.3,max:0.6,r:2+Math.random()*2,col});
 }
}
function explode(m){
 const cols=['#ffd257','#ff8c42','#ff5f4d','#fff3b0','#c98bff'];
 for(let i=0;i<36;i++){
  const a=Math.random()*Math.PI*2, sp=100+Math.random()*320;
  particles.push({x:m.x,y:m.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,g:260,life:0.5+Math.random()*0.6,max:1.1,r:3+Math.random()*5,col:cols[i%cols.length]});
 }
}
function addTaunt(m,text){ taunts.push({m,text,until:time+2.4}); }
function removeItem(it){
 const k=items.indexOf(it); if(k>=0)items.splice(k,1);
 const t=tray.find(t=>t.type===it.type); if(t)t.count++;
}

// ================= 입력 =================
function toL(e){ const r=cv.getBoundingClientRect(); return vec((e.clientX-r.left)*W/r.width,(e.clientY-r.top)*H/r.height); }
const knobPos=it=>add(it.pos,mul(fromAng(it.angle),64));
const delPos=it=>add(it.pos,vec(-54,-54));
cv.addEventListener('contextmenu',e=>e.preventDefault());
cv.addEventListener('pointerdown',e=>{
 e.preventDefault(); ensureAudio();
 if(state!=='play')return;
 const p=toL(e);
 try{cv.setPointerCapture(e.pointerId);}catch(err){}
 if(inRect(p,uiRects.sound)){ soundOn=!soundOn; return; }
 if(inRect(p,uiRects.fire)){ fire(); return; }
 if(inRect(p,uiRects.reset)){ loadStage(stageIdx); return; }
 if(p.y>FH){
  for(const c of uiRects.chips){
   if(inRect(p,c.rect)&&c.tray.count>0){
    c.tray.count--;
    const it={type:c.tray.type,pos:vec(p.x,Math.min(p.y,FH-40)),angle:ITEM_INFO[c.tray.type].defAngle};
    items.push(it); selected=it; mode='move'; return;
   }
  }
  return;
 }
 if(animActive)return;
 if(selected){
  if(dist(p,knobPos(selected))<28){ mode='rotate'; return; }
  if(dist(p,delPos(selected))<24){ removeItem(selected); selected=null; mode=null; return; }
 }
 for(let i=items.length-1;i>=0;i--){
  if(dist(p,items[i].pos)<50){ selected=items[i]; mode='move'; return; }
 }
 selected=null; mode='aim'; aimAngle=ang(sub(p,launcher));
});
cv.addEventListener('pointermove',e=>{
 if(state!=='play'||!mode)return;
 e.preventDefault();
 const p=toL(e);
 if(mode==='aim') aimAngle=ang(sub(p,launcher));
 else if(mode==='move'&&selected) selected.pos=vec(clamp(p.x,24,W-24),clamp(p.y,24,FH+50));
 else if(mode==='rotate'&&selected) selected.angle=ang(sub(p,selected.pos));
});
cv.addEventListener('pointerup',e=>{
 if(mode==='move'&&selected){
  if(selected.pos.y>FH-14){ removeItem(selected); selected=null; }
  else selected.pos.y=clamp(selected.pos.y,24,FH-24);
 }
 mode=null;
});

// ================= 업데이트 =================
let lastT=0;
function update(dt){
 time+=dt;
 if(shake>0)shake=Math.max(0,shake-dt*34);
 bannerT-=dt;
 if(state==='play'&&!animActive){
  for(const m of monsters){
   if(m.move&&!m.dead){ m.phase+=m.move.speed*dt; m.y=m.baseY+Math.sin(m.phase)*m.move.range; }
  }
 }
 particles=particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.g*dt;p.life-=dt;return p.life>0;});
 taunts=taunts.filter(t=>t.until>time&&!t.m.dead);
 if(beams&&animActive){
  beams.L+=1600*dt;
  while(beams.ei<beams.events.length&&beams.events[beams.ei].at<=beams.L) handleEvent(beams.events[beams.ei++]);
  if(beams.L>=beams.total+60){ animActive=false; beams.fadeAt=time; resolveT=0.45; }
 }
 if(resolveT>0){ resolveT-=dt; if(resolveT<=0)resolveShot(); }
}

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawBeams(){
 if(!beams)return;
 let alpha=1;
 if(!animActive){ alpha=1-(time-beams.fadeAt)/1.4; if(alpha<=0){beams=null;return;} }
 ctx.save(); ctx.globalAlpha=alpha; ctx.lineCap='round';
 for(const s of beams.segs){
  const sl=dist(s.a,s.b);

  if(vis<=0)continue;
  const d=norm(sub(s.b,s.a)), e=add(s.a,mul(d,vis));
  ctx.strokeStyle=s.power?'rgba(255,170,60,0.3)':'rgba(255,70,110,0.3)';
  ctx.lineWidth=s.power?16:10;
  ctx.beginPath();ctx.moveTo(s.a.x,s.a.y);ctx.lineTo(e.x,e.y);ctx.stroke();
  ctx.strokeStyle=s.power?'#ffcb52':'#ff4d6d';
  ctx.lineWidth=s.power?6:3.5;
  ctx.beginPath();ctx.moveTo(s.a.x,s.a.y);ctx.lineTo(e.x,e.y);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.85)';
  ctx.lineWidth=s.power?2.2:1.2;
  ctx.beginPath();ctx.moveTo(s.a.x,s.a.y);ctx.lineTo(e.x,e.y);ctx.stroke();
 }
 ctx.restore();
}
function drawItemShape(type,pos,angle,s){
 ctx.save(); ctx.translate(pos.x,pos.y); ctx.rotate(angle); ctx.scale(s,s);
 if(type==='mirror'){
  ctx.strokeStyle='#6b7f9f'; ctx.lineWidth=10; ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-48,3);ctx.lineTo(48,3);ctx.stroke();
  ctx.strokeStyle='#e8f2ff'; ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(-48,0);ctx.lineTo(48,0);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-40,-1.5);ctx.lineTo(-10,-1.5);ctx.stroke();
 } else if(type==='clens'){
  ctx.fillStyle='rgba(140,220,255,0.35)'; ctx.strokeStyle='#9fd8ff'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(-46,0); ctx.quadraticCurveTo(0,-26,46,0); ctx.quadraticCurveTo(0,26,-46,0);
  ctx.closePath(); ctx.fill(); ctx.stroke();
 } else if(type==='dlens'){
  ctx.fillStyle='rgba(200,170,255,0.3)'; ctx.strokeStyle='#c9a7ff'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(-46,-16); ctx.quadraticCurveTo(0,2,46,-16);
  ctx.lineTo(46,16); ctx.quadraticCurveTo(0,-2,-46,16);
  ctx.closePath(); ctx.fill(); ctx.stroke();
 } else if(type==='cmir'){
  ctx.rotate(-angle); // 원호는 직접 계산해 그림
  const u=fromAng(angle), C=mul(u,ARC_R);
  const ca=Math.atan2(-u.y,-u.x);
  ctx.strokeStyle='#6b7f9f'; ctx.lineWidth=12; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(C.x,C.y,ARC_R+4,ca-ARC_SPAN,ca+ARC_SPAN); ctx.stroke();
  ctx.strokeStyle='#e8f2ff'; ctx.lineWidth=7;
  ctx.beginPath(); ctx.arc(C.x,C.y,ARC_R,ca-ARC_SPAN,ca+ARC_SPAN); ctx.stroke();
 }
 ctx.restore();
}

}
function drawHUD(){
 ctx.fillStyle='rgba(12,20,40,0.85)';
 rr(12,10,190,38,10); ctx.fill();
 ctx.fillStyle='#ffd257'; ctx.font='19px Jua'; ctx.textAlign='left';
 ctx.fillText('STAGE '+(stageIdx+1)+' / '+STAGES.length,26,36);
 const s=uiRects.sound;
 ctx.fillStyle='rgba(12,20,40,0.85)';
 rr(s.x,s.y,s.w,s.h,10); ctx.fill();
 ctx.font='20px Jua'; ctx.textAlign='center';
 ctx.fillText(soundOn?'🔊':'🔇',s.x+s.w/2,s.y+27);
}
function draw(){
 ctx.clearRect(0,0,W,H);
 ctx.save();
 if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
 drawField();
 drawGlass();
 drawWalls();
 drawBeams();
 drawItems();
 drawLauncher();
 drawMonsters();
 drawParticles();
 drawAim();
 drawSelectedUI();
 drawTaunts();
 drawBanner();
 ctx.restore();
 drawTray();
 drawHUD();
}

// ================= 오버레이 =================
const $=id=>document.getElementById(id);
function show(id){$(id).classList.remove('hidden');}
function hide(id){$(id).classList.add('hidden');}
function showClear(){
 $('clearTitle').textContent='STAGE '+(stageIdx+1)+' CLEAR!';
 $('discText').textContent=cur.discovery;
 $('btnNext').textContent=stageIdx<STAGES.length-1?'다음 스테이지 ▶':'결과 보기 🏆';
 show('ovClear');
}
function showFail(){
 $('failText').textContent=FAILTXT[Math.floor(Math.random()*FAILTXT.length)];
 show('ovFail');
}
function showEnd(){
 $('endShots').textContent='사용한 레이저: '+totalShotsUsed+'발';
 $('endRank').textContent=totalShotsUsed<=14?'👑 레이저 마스터':(totalShotsUsed<=22?'🎯 명사수':'🚨 견습 순찰대');
 show('ovEnd');
}
$('btnStart').onclick=()=>{ ensureAudio(); totalShotsUsed=0; hide('ovTitle'); loadStage(chosenStart); };
$('btnNext').onclick=()=>{
 hide('ovClear');
 if(stageIdx<STAGES.length-1) loadStage(stageIdx+1);
 else { state='end'; showEnd(); }
};
$('btnRetry').onclick=()=>{ hide('ovFail'); loadStage(stageIdx); };
$('btnReplay').onclick=()=>{ hide('ovEnd'); state='title'; show('ovTitle'); };
(function buildStageSel(){
 const box=$('stageSel');
 for(let i=0;i<STAGES.length;i++){
  const b=document.createElement('button');
  b.textContent=i+1;
  if(i===0)b.classList.add('sel');
  b.onclick=()=>{ chosenStart=i; box.querySelectorAll('button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
  box.appendChild(b);
 }
})();

// ================= 루프/리사이즈 =================
function resize(){
 const m=16;
 const s=Math.min((window.innerWidth-m)/W,(window.innerHeight-m)/H);
 const w=Math.floor(W*s), h=Math.floor(H*s);
 cv.style.width=w+'px'; cv.style.height=h+'px';
 const dpr=Math.min(window.devicePixelRatio||1,2);
 cv.width=Math.floor(w*dpr); cv.height=Math.floor(h*dpr);
 ctx.setTransform(cv.width/W,0,0,cv.height/H,0,0);
 const wrap=document.getElementById('wrap');
 wrap.style.width=w+'px'; wrap.style.height=h+'px';
}
window.addEventListener('resize',resize);
resize();
function loop(t){
 const dt=Math.min((t-lastT)/1000,0.05)||0.016;
 lastT=t;
 update(dt);
 draw();
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// 디버그용 훅 (콘솔 테스트)
window._dbg={
 fire:()=>fire(),
 aim:a=>{aimAngle=a;},
 st:()=>state,
 stage:()=>stageIdx,
 load:i=>loadStage(i),
 monsters:()=>monsters,
 shots:()=>shots,
 items:()=>items,
 addItem:(type,x,y,angle)=>{const it={type,pos:vec(x,y),angle};items.push(it);return it;}
};
</script>
